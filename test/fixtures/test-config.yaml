zenbpm:
  address: "localhost:9090"
  clientId: "n8n-test-worker"

credentials: {}

workers:
  # Maps the "n8n-set-echo" job type to the Set integration.
  # Uses the "assignments" parameter format compatible with the current Set node version.
  # Each assignment echoes an incoming job variable back as output, plus a
  # fixed literal marker field — which lets the integration test assert that the
  # full worker round-trip (gRPC subscribe → execute → complete) succeeded.
  - jobType: n8n-set-echo
    adapter: n8n
    integration: set
    action: manual
    credentials: {}
    parameters:
      mode: manual
      assignments:
        assignments:
          - id: "1"
            name: echoed_greeting
            value: "={{$json.greeting}}"
            type: string
          - id: "2"
            name: echoed_value
            value: "={{$json.value}}"
            type: number
          - id: "3"
            name: worker_marker
            value: "n8n-worker-ok"
            type: string
